<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GhostPilot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="shell">

    <!-- drag handle bar at very top -->
    <div id="drag-bar">
      <div id="drag-dots"><span></span><span></span><span></span></div>
      <span id="brand">👻 GhostPilot</span>
      <div id="win-btns">
        <button class="wbtn" id="btn-hide" title="Hide  Alt+Shift+G">−</button>
        <button class="wbtn close" id="btn-quit" title="Quit">✕</button>
      </div>
    </div>

    <!-- site switcher tabs -->
    <div id="tabs">
      <button class="tab on" data-site="chatgpt">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>
        ChatGPT
      </button>
      <button class="tab" data-site="claude">
        <!-- Claude logo: radiating spokes -->
        <svg viewBox="0 0 100 100" fill="currentColor">
          <g transform="translate(50,50)">
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(0)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(45)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(90)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(135)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(180)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(225)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(270)"/>
            <rect x="-5" y="-42" width="10" height="28" rx="5" transform="rotate(315)"/>
          </g>
        </svg>
        Claude
      </button>
      <button class="tab" data-site="google">
        <!-- Google "G" logo -->
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
        Google
      </button>
      <button class="tab" data-site="gemini">
        <!-- Gemini 4-pointed star logo -->
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C12 2 10.12 9.17 2 12C10.12 14.83 12 22 12 22C12 22 13.88 14.83 22 12C13.88 9.17 12 2Z"/></svg>
        Gemini
      </button>
    </div>

    <!-- browser area -->
    <div id="browser">
      <webview
        id="view"
        src="https://chat.openai.com"
        partition="persist:ghost"
        useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
        allowpopups
      ></webview>
      <div id="loader">
        <div class="ring"></div>
      </div>
    </div>

    <!-- bottom hint bar -->
    <div id="hint">
      <span id="hint-opacity">92%</span>
      <span>Ctrl+Alt+G toggle · H hide · 1-4 switch · +/- opacity</span>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
